version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - '8078:80'
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: app_api
      DB_HOST: api_database
      DB_PORT: 5432

      PRODUCTION: "true"
      METRICS: "true"
      SECRET_KEY: ${SECRET_KEY}
      YANDEX_CLOUD_FOLDER: ${YANDEX_CLOUD_FOLDER}
      YANDEX_CLOUD_API_KEY: ${YANDEX_CLOUD_API_KEY}
      YANDEX_CLOUD_MODEL: ${YANDEX_CLOUD_MODEL:-qwen3.5-35b-a3b-fp8/latest}
      YANDEX_CLOUD_BASE_URL: ${YANDEX_CLOUD_BASE_URL:-https://ai.api.cloud.yandex.net/v1}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-120}
    restart: always
    depends_on:
      - api_database

    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost/ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  api_database:
    image: postgres:17
    command: postgres -N 100
    volumes:
      - api_database_volume:/var/lib/postgresql/data/
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=app_api
    ports:
      - '54325:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  api_database_volume:
