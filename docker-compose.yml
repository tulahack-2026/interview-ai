version: '3.8'

services:
  api_database:
    image: postgres:17
    command: postgres -N 100
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-app_api}
    volumes:
      - api_database_volume:/var/lib/postgresql/data/
    ports:
      - '54325:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    restart: always
    ports:
      - '8078:80'
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-app_api}
      DB_HOST: api_database
      DB_PORT: 5432
      PRODUCTION: ${PRODUCTION:-false}
      METRICS: ${METRICS:-false}
      YANDEX_CLOUD_FOLDER: ${YANDEX_CLOUD_FOLDER:-}
      YANDEX_CLOUD_API_KEY: ${YANDEX_CLOUD_API_KEY:-}
      YANDEX_CLOUD_MODEL: ${YANDEX_CLOUD_MODEL:-qwen3.5-35b-a3b-fp8/latest}
      YANDEX_CLOUD_BASE_URL: ${YANDEX_CLOUD_BASE_URL:-https://ai.api.cloud.yandex.net/v1}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-120}
    depends_on:
      api_database:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '--fail', 'http://localhost/ping']
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8078}
    restart: always
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_healthy

volumes:
  api_database_volume:
